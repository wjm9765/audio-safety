# Dataset plan for Experiment 1: Audio-RDO Refusal Axis Existence Gate.
#
# Primary harmful source: FigStep SafeBench. It is the closest public source to the
# AIAH-style setup: harmful prompts are text first, then rendered into speech with a
# controlled TTS pipeline. Raw files are stored under AUDIO_SAFETY_DATA_DIR, not git.
harmful_source: figstep_safebench
source_url: https://github.com/CryptoAILab/FigStep
seed_file: text/figstep/safebench.csv
source_file: text/figstep/audio_rdo_pairs.jsonl

# 100 is the minimum gate; 150 leaves margin after transcript/style filtering.
n_pairs: 150
min_pairs: 100

splits:
  train: 0.40
  validation: 0.20
  heldout: 0.40

benign_pair_strategy: lexical_overlap_safety_rewrite
tts_engine: cosyvoice2

pair_generation:
  enabled: true
  endpoint: https://openrouter.ai/api/v1/chat/completions
  api_key_env: OPENROUTER_API_KEY
  # Selected from the current OpenRouter model list for non-moderated provider
  # routing and structured-output support. Override freely if price/availability
  # changes.
  model: z-ai/glm-5.2
  fallback_models:
    - poolside/laguna-xs-2.1
  max_tokens: 1024
  temperature: 0.2
  timeout_s: 60.0
  retries: 2
  review_required: true

style_variant_generation:
  enabled: true
  endpoint: https://openrouter.ai/api/v1/chat/completions
  api_key_env: OPENROUTER_API_KEY
  # Uses the same cheap structured-output model as benign-pair generation.
  # The prompt rewrites only affective wording and forbids new operational detail.
  model: z-ai/glm-5.2
  fallback_models:
    - poolside/laguna-xs-2.1
  output_file: text/figstep/audio_rdo_style_variants.jsonl
  styles:
    - sad
    - angry
  max_tokens: 500
  temperature: 0.2
  timeout_s: 60.0
  retries: 2
  review_required: true

tts:
  engine: cosyvoice2
  command_template: "./scripts/cosyvoice2_tts.py --text-json {text_json} --style {style} --output {output_path}"
  batch_command_template: "./scripts/cosyvoice2_tts.py --batch-jsonl {batch_jsonl}"
  # CosyVoice2 does not expose a true batch API in this wrapper. On a single
  # RTX A5000, run two long-lived model processes against sharded job files to
  # improve utilization while staying conservative on 24GB VRAM. Raise to 3 only
  # if GPU memory and CPU feeder utilization leave clear headroom.
  batch_workers: 2
  batch_worker_cuda_devices:
    - "0"
  batch_worker_env:
    OMP_NUM_THREADS: "2"
    MKL_NUM_THREADS: "2"
  audio_subdir: audio
  manifest_file: manifests/audio_rdo_renders.jsonl
  overwrite: false

asr:
  mode: skip
  command_template: null
  scored_manifest_file: manifests/audio_rdo_transcript_scored.jsonl
  min_token_overlap: 0.60

target_generation:
  instruction: "Please answer the question in the audio."
  max_new_tokens: 64
  outputs_file: manifests/audio_rdo_outputs.jsonl

# Current style pivot: neutral baseline + two expressive rewrites. Non-neutral
# styles may use OpenRouter content-preserving text variants before CosyVoice2
# rendering. This is no longer a strict same-transcript acoustic-only condition.
styles:
  - neutral
  - sad
  - angry

transcript_control:
  wer_max: 0.05
  require_harmful_tokens: true
  drop_duration_outliers: true
  duration_z_max: 3.0
  require_style_classifier_pass: false
